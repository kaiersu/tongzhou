<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通州环境监测站点地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Microsoft YaHei","PingFang SC",sans-serif; background:#f5f5f5; }
#map { width:100vw; height:100vh; }

/* 导入界面 */
#import-overlay {
  position:absolute; top:0; left:0; width:100%; height:100%; z-index:2000;
  background:rgba(0,0,0,0.45); display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(2px);
}
#import-box {
  background:white; border-radius:16px; padding:40px 48px; text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.25); max-width:480px; width:90%;
}
#import-box h1 { font-size:22px; margin-bottom:6px; }
#import-box p { color:#888; font-size:14px; margin-bottom:20px; }
#import-zone {
  border:2px dashed #2980b9; border-radius:12px; padding:36px 20px;
  cursor:pointer; transition:all 0.2s; background:#f0f7ff;
}
#import-zone:hover { border-color:#1a5276; background:#e3f0ff; }
#import-zone.dragover { border-color:#27ae60; background:#e8f8f0; }
#import-zone .icon { font-size:48px; margin-bottom:8px; }
#import-zone .hint { font-size:15px; color:#2980b9; font-weight:bold; }
#import-zone .sub { font-size:13px; color:#999; margin-top:4px; }
#import-zone input { display:none; }

/* 地图控件 */
.legend { background:rgba(255,255,255,0.95); padding:10px 14px; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,0.2); font-size:14px; line-height:1.8; }
.legend-item { display:flex; align-items:center; gap:8px; }
.legend-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
.legend-title { font-weight:bold; margin-bottom:2px; font-size:15px; }
.popup-name { font-size:16px; font-weight:bold; margin-bottom:4px; }
.popup-label { color:#888; font-size:12px; }
.popup-value { font-size:14px; margin-bottom:6px; }
.info-panel { position:absolute; top:80px; right:12px; z-index:1000; background:rgba(255,255,255,0.95); padding:10px 16px; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,0.2); font-size:13px; min-width:150px; display:none; }
.info-panel h3 { font-size:14px; margin-bottom:4px; }
.info-panel .num { color:#2c7fb8; font-weight:bold; font-size:20px; }
.layer-btn { display:none; position:absolute; bottom:60px; right:12px; z-index:1000; background:white; border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,0.2); overflow:hidden; }
.layer-btn button { display:block; width:80px; padding:8px 6px; border:none; background:white; cursor:pointer; font-size:13px; border-bottom:1px solid #eee; }
.layer-btn button:last-child { border-bottom:none; }
.layer-btn button.on { background:#2980b9; color:white; font-weight:bold; }
.layer-btn button:hover:not(.on) { background:#f0f0f0; }
.site-label { background:rgba(255,255,255,0.9); border:1px solid #bbb; border-radius:3px; padding:1px 6px; font-size:12px; font-weight:bold; white-space:nowrap; box-shadow:0 1px 4px rgba(0,0,0,0.15); }
.filter-panel { position:absolute; top:12px; left:12px; z-index:1000; background:rgba(255,255,255,0.95); padding:10px 14px; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,0.2); font-size:13px; line-height:2; display:none; }
.filter-panel label { display:flex; align-items:center; gap:6px; cursor:pointer; }
.filter-panel input { margin:0; cursor:pointer; }
.filter-title { font-weight:bold; font-size:14px; margin-bottom:2px; }
#import-btn {
  position:absolute; top:12px; right:12px; z-index:1000; display:none;
  background:rgba(255,255,255,0.95); border:1px solid #2980b9; border-radius:6px;
  padding:8px 14px; cursor:pointer; font-size:13px; color:#2980b9; font-weight:bold;
  box-shadow:0 2px 8px rgba(0,0,0,0.15); transition:all 0.2s;
}
#import-btn:hover { background:#2980b9; color:white; }
</style>
</head>
<body>
<div id="map"></div>

<div id="import-overlay">
  <div id="import-box">
    <h1>通州环境监测站点</h1>
    <p>导入奥维地图导出的 ovjsn 文件，自动生成分布图</p>
    <div id="import-zone">
      <div class="icon">📂</div>
      <div class="hint">点击选择 ovjsn 文件</div>
      <div class="sub">或将文件拖拽到此处</div>
      <input type="file" id="file-input" accept=".ovjsn,.json">
    </div>
  </div>
</div>

<div id="import-btn" onclick="document.getElementById('file-input').click()">📂 重新导入</div>
<div class="filter-panel" id="filter-panel">
  <div class="filter-title">组别筛选</div>
  <label><input type="checkbox" id="chkBoundary" checked> 10x边界站</label>
  <label><input type="checkbox" id="chkRiver" checked> 15x河道站</label>
</div>
<div class="layer-btn">
  <button id="btnSat" class="on">卫星图</button>
  <button id="btnMap">地图</button>
</div>

// ======== 坐标转换 ========
var PI=Math.PI,a=6378245,ee=0.00669342162296594323;
function tLon(x,y){var r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r;}
function tLat(x,y){var r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r;}
function wgsToGcj(lng,lat){var dlat=tLat(lng-105,lat-35),dlng=tLon(lng-105,lat-35);var rad=lat/180*PI,m=Math.sin(rad);m=1-ee*m*m;var sm=Math.sqrt(m);dlat=(dlat*180)/(a*(1-ee)/(m*sm)*PI);dlng=(dlng*180)/(a/sm*Math.cos(rad)*PI);return[lng+dlng,lat+dlat];}

// ======== 颜色映射 ========
var SIGN_COLORS = {6:'#27ae60',8:'#e74c3c',4:'#f1c40f'};
var SIGN_LABELS = {4:'进行中',6:'已完成',8:'待协调'};

// ======== 初始化地图 ========
var map = L.map('map',{center:[39.82,116.72],zoom:10,zoomControl:true});
var satLayer = L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',{maxZoom:18,subdomains:'1234',attribution:'&copy; 高德地图'});
var mapLayer = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{maxZoom:18,subdomains:'1234',attribution:'&copy; 高德地图'});
satLayer.addTo(map);

// 边界
var boundaryLayer = L.geoJSON(BOUNDARY,{style:{color:"#2c7fb8",weight:3,opacity:0.85,fillColor:"#2c7fb8",fillOpacity:0.15}}).addTo(map);

// 站点图层组
var siteGroup = null;
var groupLayerBoundary = null;
var groupLayerRiver = null;

// 图例控件
var legendControl = null;
var statsControl = null;

// ======== 导入逻辑 ========
var fileInput = document.getElementById('file-input');
var importZone = document.getElementById('import-zone');
var importOverlay = document.getElementById('import-overlay');
var importBtn = document.getElementById('import-btn');
var filterPanel = document.getElementById('filter-panel');

importZone.onclick = function(){ fileInput.click(); };

importZone.addEventListener('dragover', function(e){ e.preventDefault(); this.classList.add('dragover'); });
importZone.addEventListener('dragleave', function(){ this.classList.remove('dragover'); });
importZone.addEventListener('drop', function(e){ e.preventDefault(); this.classList.remove('dragover'); if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });

fileInput.onchange = function(){ if(this.files.length) handleFile(this.files[0]); };

function handleFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if(!data.ObjItems) throw new Error('不是有效的奥维 ovjsn 文件');
      renderSites(data);
      importOverlay.style.display = 'none';
      importBtn.style.display = 'block';
      filterPanel.style.display = 'block';
    } catch(err) {
      alert('文件解析失败：' + err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function renderSites(data) {
  // 清除旧站点
  if(siteGroup) map.removeLayer(siteGroup);
  siteGroup = L.featureGroup().addTo(map);
  groupLayerBoundary = L.featureGroup().addTo(siteGroup);
  groupLayerRiver = L.featureGroup().addTo(siteGroup);

  var bounds = [];
  var counts = {6:0,8:0,4:0};
  var groupCounts = {};

  data.ObjItems.forEach(function(item){
    var gname = item.Object.Name;
    var children = item.Object.ObjectDetail.ObjChildren;
    groupCounts[gname] = children.length;
    children.forEach(function(child){
      var obj = child.Object;
      var det = obj.ObjectDetail;
      var sign = det.SignPic.SignPic;
      var color = SIGN_COLORS[sign] || '#95a5a6';
      var label = SIGN_LABELS[sign] || '';
      var comment = (obj.Comment || '').replace(/\r?\n/g,' | ');
      var c = wgsToGcj(det.Lng, det.Lat);
      var m = L.circleMarker([c[1],c[0]],{color:color,radius:10,weight:2,fillOpacity:0.8});
      m.bindTooltip(obj.Name,{permanent:true,direction:'top',offset:[0,-14],className:'site-label'});
      m.bindPopup('<div class="popup-name">'+obj.Name+'</div><div class="popup-label">组别</div><div class="popup-value">'+gname+'</div><div class="popup-label">状态</div><div class="popup-value">'+label+'</div>'+(comment?'<div class="popup-label">地址</div><div class="popup-value">'+comment+'</div>':'')+'<div class="popup-label">坐标</div><div class="popup-value">'+det.Lat.toFixed(6)+', '+det.Lng.toFixed(6)+'</div>');
      (gname.indexOf('15x')>=0?groupLayerRiver:groupLayerBoundary).addLayer(m);
      bounds.push([c[1],c[0]]);
      if(counts[sign]!==undefined) counts[sign]++;
      else counts[sign]=1;
    });
  });

  if(bounds.length) map.fitBounds(bounds,{padding:[40,40]});

  // 更新图例
  if(legendControl) map.removeControl(legendControl);
  legendControl = L.control({position:'bottomleft'});
  legendControl.onAdd = function(){
    var d=L.DomUtil.create('div','legend');
    d.innerHTML='<div class="legend-title">通州环境监测站点</div><div class="legend-item"><span class="legend-dot" style="background:#e74c3c"></span> 待协调</div><div class="legend-item"><span class="legend-dot" style="background:#f1c40f"></span> 进行中</div><div class="legend-item"><span class="legend-dot" style="background:#27ae60"></span> 已完成</div>';
    return d;
  };
  legendControl.addTo(map);

  // 更新统计
  if(statsControl) map.removeControl(statsControl);
  statsControl = L.control({position:'topright'});
  statsControl.onAdd = function(){
    var d=L.DomUtil.create('div','info-panel');
    d.style.display='block';
    d.innerHTML='<h3>站点统计</h3><div>待协调：<span class="num">'+(counts[8]||0)+'</span></div><div>进行中：<span class="num">'+(counts[4]||0)+'</span></div><div>已完成：<span class="num">'+(counts[6]||0)+'</span></div><div>合计：<span class="num" style="color:#333">'+(counts[4]+counts[6]+counts[8])+'</span></div>';
    return d;
  };
  statsControl.addTo(map);
}

// ======== 组别筛选 ========
document.getElementById('chkBoundary').onchange=function(){
  if(!groupLayerBoundary) return;
  if(this.checked) siteGroup.addLayer(groupLayerBoundary);
  else siteGroup.removeLayer(groupLayerBoundary);
};
document.getElementById('chkRiver').onchange=function(){
  if(!groupLayerRiver) return;
  if(this.checked) siteGroup.addLayer(groupLayerRiver);
  else siteGroup.removeLayer(groupLayerRiver);
};

// ======== 底图切换 ========
document.getElementById('btnSat').onclick=function(){
